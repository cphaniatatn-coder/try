<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhuyin Master Trainer</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --initial-color: #ffcccc;
            --medial-color: #ccffcc;
            --final-color: #ccccff;
            --disabled-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .display-area {
            font-size: 3rem;
            height: 80px;
            margin-bottom: 20px;
            padding: 10px 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 200px;
            text-align: center;
        }

        .keyboard-container {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: 10px;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .key {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 8px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .key:active { transform: scale(0.9); }

        .initial { background-color: var(--initial-color); }
        .medial { background-color: var(--medial-color); }
        .final { background-color: var(--final-color); }

        .key.disabled {
            background-color: var(--disabled-color);
            color: #a0a0a0;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .key.highlight {
            ring: 3px solid #333;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }

        .controls { margin-top: 20px; }
        .btn-reset {
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 5px;
            border: none;
            background: #333;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Zhuyin Interactive Keyboard</h1>
    
    <div class="display-area" id="display">_</div>

    <div class="keyboard-container" id="keyboard">
        <button class="key initial" onclick="press('ㄅ', 'initial')">ㄅ</button>
        <button class="key initial" onclick="press('ㄆ', 'initial')">ㄆ</button>
        <button class="key initial" onclick="press('ㄇ', 'initial')">ㄇ</button>
        <button class="key initial" onclick="press('ㄈ', 'initial')">ㄈ</button>
        <button class="key initial" onclick="press('ㄉ', 'initial')">ㄉ</button>
        <button class="key initial" onclick="press('ㄊ', 'initial')">ㄊ</button>
        <button class="key initial" onclick="press('ㄋ', 'initial')">ㄋ</button>
        <button class="key initial" onclick="press('ㄌ', 'initial')">ㄌ</button>
        <button class="key initial" onclick="press('ㄍ', 'initial')">ㄍ</button>
        <button class="key initial" onclick="press('ㄎ', 'initial')">ㄎ</button>
        <button class="key initial" onclick="press('ㄏ', 'initial')">ㄏ</button>
        <button class="key initial" onclick="press('ㄐ', 'initial')">ㄐ</button>
        <button class="key initial" onclick="press('ㄑ', 'initial')">ㄑ</button>
        <button class="key initial" onclick="press('ㄒ', 'initial')">ㄒ</button>
        <button class="key initial" onclick="press('ㄓ', 'initial')">ㄓ</button>
        <button class="key initial" onclick="press('ㄔ', 'initial')">ㄔ</button>
        <button class="key initial" onclick="press('ㄕ', 'initial')">ㄕ</button>
        <button class="key initial" onclick="press('ㄖ', 'initial')">ㄖ</button>
        <button class="key initial" onclick="press('ㄗ', 'initial')">ㄗ</button>
        <button class="key initial" onclick="press('ㄘ', 'initial')">ㄘ</button>
        <button class="key initial" onclick="press('ㄙ', 'initial')">ㄙ</button>

        <button class="key medial" onclick="press('ㄧ', 'medial')">ㄧ</button>
        <button class="key medial" onclick="press('ㄨ', 'medial')">ㄨ</button>
        <button class="key medial" onclick="press('ㄩ', 'medial')">ㄩ</button>

        <button class="key final" onclick="press('ㄚ', 'final')">ㄚ</button>
        <button class="key final" onclick="press('ㄛ', 'final')">ㄛ</button>
        <button class="key final" onclick="press('ㄜ', 'final')">ㄜ</button>
        <button class="key final" onclick="press('ㄝ', 'final')">ㄝ</button>
        <button class="key final" onclick="press('ㄞ', 'final')">ㄞ</button>
        <button class="key final" onclick="press('ㄟ', 'final')">ㄟ</button>
        <button class="key final" onclick="press('ㄠ', 'final')">ㄠ</button>
        <button class="key final" onclick="press('ㄡ', 'final')">ㄡ</button>
        <button class="key final" onclick="press('ㄢ', 'final')">ㄢ</button>
        <button class="key final" onclick="press('ㄣ', 'final')">ㄣ</button>
        <button class="key final" onclick="press('ㄤ', 'final')">ㄤ</button>
        <button class="key final" onclick="press('ㄥ', 'final')">ㄥ</button>
        <button class="key final" onclick="press('ㄦ', 'final')">ㄦ</button>
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="resetGame()">Reset</button>
    </div>

    <script>
        let currentSyllable = { initial: '', medial: '', final: '' };

        function press(char, type) {
            const keys = document.querySelectorAll('.key');
            
            if (type === 'initial') {
                currentSyllable.initial = char;
                // Setelah tekan konsonan, highlight vokal (medial & final)
                updateVisuals('medial-final');
            } else if (type === 'medial') {
                currentSyllable.medial = char;
                updateVisuals('final-only');
            } else if (type === 'final') {
                currentSyllable.final = char;
                updateVisuals('done');
            }
            
            renderDisplay();
        }

        function updateVisuals(state) {
            const keys = document.querySelectorAll('.key');
            keys.forEach(key => {
                key.classList.remove('highlight');
                key.classList.add('disabled');

                if (state === 'medial-final') {
                    if (key.classList.contains('medial') || key.classList.contains('final')) {
                        key.classList.remove('disabled');
                        key.classList.add('highlight');
                    }
                } else if (state === 'final-only') {
                    if (key.classList.contains('final')) {
                        key.classList.remove('disabled');
                        key.classList.add('highlight');
                    }
                } else if (state === 'done') {
                    // Semua dikunci sampai reset
                }
            });
        }

        function renderDisplay() {
            const res = currentSyllable.initial + currentSyllable.medial + currentSyllable.final;
            document.getElementById('display').innerText = res || '_';
        }

        function resetGame() {
            currentSyllable = { initial: '', medial: '', final: '' };
            const keys = document.querySelectorAll('.key');
            keys.forEach(key => {
                key.classList.remove('disabled', 'highlight');
            });
            renderDisplay();
        }
    </script>
</body>
</html>

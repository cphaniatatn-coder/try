<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhuyin Master - Quiz Mode</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --initial-color: #ffcccc;
            --medial-color: #ccffcc;
            --final-color: #ccccff;
            --correct: #2ecc71;
            --wrong: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .quiz-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
        }

        .target-hanzi { font-size: 5rem; margin: 0; color: #2c3e50; }
        .target-meaning { color: #7f8c8d; margin-bottom: 10px; }

        .display-area {
            font-size: 2.5rem;
            letter-spacing: 5px;
            height: 60px;
            margin: 20px 0;
            color: #34495e;
            border-bottom: 3px solid #eee;
        }

        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: 8px;
            max-width: 900px;
            background: #fff;
            padding: 15px;
            border-radius: 15px;
        }

        .key {
            width: 50px; height: 50px;
            border: none; border-radius: 8px;
            font-size: 1.2rem; cursor: pointer;
            transition: 0.2s; font-weight: bold;
        }

        .initial { background: var(--initial-color); }
        .medial { background: var(--medial-color); }
        .final { background: var(--final-color); }

        .key.disabled { opacity: 0.2; cursor: not-allowed; }
        .key.highlight { box-shadow: 0 0 10px rgba(0,0,0,0.3); transform: scale(1.05); }

        .feedback { font-weight: bold; height: 24px; margin-top: 10px; }
        .correct-text { color: var(--correct); }
        .wrong-text { color: var(--wrong); }

        .stats { margin-top: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="target-meaning" id="vocab-category">Tebak Ejaan Zhuyin:</div>
        <h1 class="target-hanzi" id="target-hanzi">馬</h1>
        <div class="display-area" id="display-input">_</div>
        <div class="feedback" id="feedback"></div>
    </div>

    <div class="keyboard-grid" id="keyboard">
        <button class="key initial" onclick="inputZhuyin('ㄅ')">ㄅ</button>
        <button class="key initial" onclick="inputZhuyin('ㄆ')">ㄆ</button>
        <button class="key initial" onclick="inputZhuyin('ㄇ')">ㄇ</button>
        <button class="key initial" onclick="inputZhuyin('ㄈ')">ㄈ</button>
        <button class="key initial" onclick="inputZhuyin('ㄉ')">ㄉ</button>
        <button class="key initial" onclick="inputZhuyin('ㄊ')">ㄊ</button>
        <button class="key initial" onclick="inputZhuyin('ㄋ')">ㄋ</button>
        <button class="key initial" onclick="inputZhuyin('ㄌ')">ㄌ</button>
        <button class="key initial" onclick="inputZhuyin('ㄍ')">ㄍ</button>
        <button class="key initial" onclick="inputZhuyin('ㄎ')">ㄎ</button>
        <button class="key initial" onclick="inputZhuyin('ㄏ')">ㄏ</button>
        <button class="key initial" onclick="inputZhuyin('ㄐ')">ㄐ</button>
        <button class="key initial" onclick="inputZhuyin('ㄑ')">ㄑ</button>
        <button class="key initial" onclick="inputZhuyin('ㄒ')">ㄒ</button>
        <button class="key initial" onclick="inputZhuyin('ㄓ')">ㄓ</button>
        <button class="key initial" onclick="inputZhuyin('ㄔ')">ㄔ</button>
        <button class="key initial" onclick="inputZhuyin('ㄕ')">ㄕ</button>
        <button class="key initial" onclick="inputZhuyin('ㄖ')">ㄖ</button>
        <button class="key initial" onclick="inputZhuyin('ㄗ')">ㄗ</button>
        <button class="key initial" onclick="inputZhuyin('ㄘ')">ㄘ</button>
        <button class="key initial" onclick="inputZhuyin('ㄙ')">ㄙ</button>

        <button class="key medial" onclick="inputZhuyin('ㄧ')">ㄧ</button>
        <button class="key medial" onclick="inputZhuyin('ㄨ')">ㄨ</button>
        <button class="key medial" onclick="inputZhuyin('ㄩ')">ㄩ</button>

        <button class="key final" onclick="inputZhuyin('ㄚ')">ㄚ</button>
        <button class="key final" onclick="inputZhuyin('ㄛ')">ㄛ</button>
        <button class="key final" onclick="inputZhuyin('ㄜ')">ㄜ</button>
        <button class="key final" onclick="inputZhuyin('ㄝ')">ㄝ</button>
        <button class="key final" onclick="inputZhuyin('ㄞ')">ㄞ</button>
        <button class="key final" onclick="inputZhuyin('ㄟ')">ㄟ</button>
        <button class="key final" onclick="inputZhuyin('ㄠ')">ㄠ</button>
        <button class="key final" onclick="inputZhuyin('ㄡ')">ㄡ</button>
        <button class="key final" onclick="inputZhuyin('ㄢ')">ㄢ</button>
        <button class="key final" onclick="inputZhuyin('ㄣ')">ㄣ</button>
        <button class="key final" onclick="inputZhuyin('ㄤ')">ㄤ</button>
        <button class="key final" onclick="inputZhuyin('ㄥ')">ㄥ</button>
        <button class="key final" onclick="inputZhuyin('ㄦ')">ㄦ</button>
    </div>

    <div class="stats">
        Skor: <span id="score">0</span> | Soal ke: <span id="question-num">1</span>
    </div>
    <button onclick="nextQuestion()" style="margin-top:20px; padding:10px 20px; cursor:pointer;">Lewati / Next</button>

    <script>
        // Data Latihan (Bisa ditambah sesuai level TOCFL)
        const wordList = [
            { hanzi: '馬', zhuyin: 'ㄇㄚ' },
            { hanzi: '我', zhuyin: 'ㄨㄛ' },
            { hanzi: '爸爸', zhuyin: 'ㄅㄚㄅㄚ' }, // Game ini akan fokus per karakter dulu
            { hanzi: '你', zhuyin: 'ㄋㄧ' },
            { hanzi: '好', zhuyin: 'ㄏㄠ' },
            { hanzi: '水', zhuyin: 'ㄕㄨㄟ' },
            { hanzi: '學', zhuyin: 'ㄒㄩㄝ' }
        ];

        let currentIndex = 0;
        let score = 0;
        let userInput = "";

        const initials = "ㄅㄆㄇㄈㄉㄊㄋㄌㄍㄎㄏㄐㄑㄒㄓㄔㄕㄖㄗㄘㄙ";
        const medials = "ㄧㄨㄩ";
        const finals = "ㄚㄛㄜㄝㄞㄟㄠㄡㄢㄣㄤㄥㄦ";

        function initGame() {
            showQuestion();
        }

        function showQuestion() {
            userInput = "";
            document.getElementById('display-input').innerText = "_";
            document.getElementById('feedback').innerText = "";
            document.getElementById('target-hanzi').innerText = wordList[currentIndex].hanzi;
            document.getElementById('question-num').innerText = currentIndex + 1;
            resetKeyboard();
        }

        function inputZhuyin(char) {
            userInput += char;
            document.getElementById('display-input').innerText = userInput;
            
            // Logika bantu: Jika sudah tekan konsonan, highlight vokal
            if (initials.includes(char)) {
                disableKeys('initial');
                highlightKeys(['medial', 'final']);
            } 
            
            checkAnswer();
        }

        function checkAnswer() {
            const target = wordList[currentIndex].zhuyin;
            
            if (userInput === target) {
                document.getElementById('feedback').innerHTML = "<span class='correct-text'>Hebat! Benar! ✨</span>";
                score += 10;
                document.getElementById('score').innerText = score;
                setTimeout(nextQuestion, 1500);
            } else if (userInput.length >= target.length) {
                // Jika panjang input sudah sama tapi salah
                document.getElementById('feedback').innerHTML = "<span class='wrong-text'>Coba lagi ya!</span>";
                setTimeout(() => {
                    userInput = "";
                    document.getElementById('display-input').innerText = "_";
                    resetKeyboard();
                }, 1000);
            }
        }

        function nextQuestion() {
            currentIndex = (currentIndex + 1) % wordList.length;
            showQuestion();
        }

        function disableKeys(className) {
            document.querySelectorAll('.' + className).forEach(k => k.classList.add('disabled'));
        }

        function highlightKeys(classNames) {
            document.querySelectorAll('.key').forEach(k => k.classList.add('disabled'));
            classNames.forEach(cls => {
                document.querySelectorAll('.' + cls).forEach(k => {
                    k.classList.remove('disabled');
                    k.classList.add('highlight');
                });
            });
        }

        function resetKeyboard() {
            document.querySelectorAll('.key').forEach(k => {
                k.classList.remove('disabled', 'highlight');
            });
        }

        window.onload = initGame;
    </script>
</body>
</html>

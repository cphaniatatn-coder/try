<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刮刮樂拼音小測驗</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 24px;
        }

        .game-zone {
            position: relative;
            width: 320px;
            height: 180px;
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        /* 底層：題目中文字 */
        .quiz-target {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff3e0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 72px;
            font-weight: bold;
            color: #e67e22;
            user-select: none;
        }

        /* 表層：刮刮樂畫布 */
        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        /* 答案選項區 */
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 25px;
        }

        .btn-option {
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-option:hover {
            border-color: var(--primary-color);
            background-color: #edf2f7;
        }

        .btn-option.correct {
            background-color: var(--success-color) !important;
            border-color: var(--success-color) !important;
            color: white;
        }

        .btn-option.wrong {
            background-color: var(--error-color) !important;
            border-color: var(--error-color) !important;
            color: white;
        }

        /* 提示與下一題 */
        #feedback {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            min-height: 27px;
        }

        .btn-next {
            margin-top: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }

        .btn-next:hover {
            background-color: #357abd;
        }

        .hint {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ 刮刮樂拼音大挑戰 ✨</h1>
    <p class="hint" id="game-hint">動動手指，把灰色的刮刮樂刮開吧！</p>
    
    <div class="game-zone">
        <div class="quiz-target" id="word-display">學</div>
        <canvas id="scratch-canvas" width="320" height="180"></canvas>
    </div>

    <div id="feedback"></div>
    <div class="options-container" id="options-box"></div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">下一題 ➡️</button>
</div>

<script>
    // 題庫設定：可以自行修改或擴充題目
    const quizData = [
        { word: "學", pinyin: "xué", options: ["xué", "xiá", "xüé", "shé"] },
        { word: "漢", pinyin: "hàn", options: ["hān", "hán", "hǎn", "hàn"] },
        { word: "語", pinyin: "yǔ", options: ["yū", "yú", "yǔ", "yù"] },
        { word: "玩", pinyin: "wán", options: ["wān", "wán", "wǎn", "wàn"] },
        { word: "樂", pinyin: "lè", options: ["yuè", "lè", "lù", "lī"] }
    ];

    let currentIndex = 0;
    let isScratchedEnough = false;
    let hasAnswered = false;

    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // 初始化題目
    function initQuiz() {
        isScratchedEnough = false;
        hasAnswered = false;
        document.getElementById('game-hint').innerText = "動動手指，把灰色的刮刮樂刮開吧！";
        document.getElementById('feedback').innerText = "";
        document.getElementById('btn-next').style.display = 'none';
        canvas.style.opacity = '1';
        canvas.style.pointerEvents = 'auto';

        // 載入字詞
        const currentQuiz = quizData[currentIndex];
        document.getElementById('word-display').innerText = currentQuiz.word;

        // 重置並繪製刮刮樂遮罩
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = '#b0bec5'; // 刮刮樂的灰色
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 加上一些刮刮樂的點綴字
        ctx.font = 'bold 20px sans-serif';
        ctx.fillStyle = '#78909c';
        ctx.textAlign = 'center';
        ctx.fillText('刮開看題目', canvas.width / 2, canvas.height / 2 + 7);

        // 產生選項
        const optionsBox = document.getElementById('options-box');
        optionsBox.innerHTML = '';
        currentQuiz.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt);
            // 在刮開前先禁用選項按鈕
            btn.disabled = true;
            optionsBox.appendChild(btn);
        });

        setupCanvasEvents();
    }

    // 處理畫布事件（支援電腦滑鼠與手機觸控）
    function setupCanvasEvents() {
        function startDrawing(e) {
            isDrawing = true;
            scratch(e);
        }

        function stopDrawing() {
            isDrawing = false;
            if (!isScratchedEnough) {
                checkScratchPercentage();
            }
        }

        function scratch(e) {
            if (!isDrawing) return;
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            // 支援手機觸控與滑鼠
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2); // 20 是刮除的畫筆半徑
            ctx.fill();
        }

        // 滑鼠事件
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', scratch);
        window.addEventListener('mouseup', stopDrawing);

        // 觸控事件
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', scratch);
        window.addEventListener('touchend', stopDrawing);
    }

    // 檢查刮除面積
    function checkScratchPercentage() {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imgData.data;
        let clearedPixels = 0;

        // 檢查透明像素的比例
        for (let i = 3; i < pixels.length; i += 4) {
            if (pixels[i] === 0) {
                clearedPixels++;
            }
        }

        const percentage = (clearedPixels / (canvas.width * canvas.height)) * 100;

        // 如果刮開超過 35%，就判定自動完全顯現，並允許作答
        if (percentage > 35) {
            isScratchedEnough = true;
            canvas.style.opacity = '0';
            canvas.style.pointerEvents = 'none'; // 讓畫布不再阻擋點擊
            
            document.getElementById('game-hint').innerText = "請選擇正確的拼音！";
            
            // 啟用所有選項按鈕
            const buttons = document.querySelectorAll('.btn-option');
            buttons.forEach(btn => btn.disabled = false);
        }
    }

    // 檢查答案
    function checkAnswer(selectedButton, answer) {
        if (hasAnswered) return;
        hasAnswered = true;

        const currentQuiz = quizData[currentIndex];
        const feedback = document.getElementById('feedback');
        const buttons = document.querySelectorAll('.btn-option');

        // 禁用所有按鈕防止重複點擊
        buttons.forEach(btn => btn.disabled = true);

        if (answer === currentQuiz.pinyin) {
            selectedButton.classList.add('correct');
            feedback.innerHTML = "<span style='color: var(--success-color);'>🎉 答對了！太棒了！</span>";
        } else {
            selectedButton.classList.add('wrong');
            feedback.innerHTML = `<span style='color: var(--error-color);'>❌ 答錯了，標準答案是：${currentQuiz.pinyin}</span>`;
            
            // 幫學生標示出正確的那個選項
            buttons.forEach(btn => {
                if (btn.innerText === currentQuiz.pinyin) {
                    btn.classList.add('correct');
                }
            });
        }

        // 顯示下一題按鈕
        document.getElementById('btn-next').style.display = 'inline-block';
    }

    // 下一題
    function nextQuestion() {
        currentIndex = (currentIndex + 1) % quizData.length; // 循環題庫
        initQuiz();
    }

    // 啟動遊戲
    window.onload = initQuiz;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhuyin Master - Tone Edition</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --initial-color: #ffcccc;
            --medial-color: #ccffcc;
            --final-color: #ccccff;
            --tone-color: #ffe599;
            --correct: #2ecc71;
            --wrong: #e74c3c;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .quiz-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; width: 90%; max-width: 500px; }
        .target-hanzi { font-size: 4.5rem; margin: 10px 0; color: #2c3e50; }
        .display-area { font-size: 2.2rem; min-height: 50px; margin: 15px 0; color: #34495e; border-bottom: 2px solid #ddd; display: flex; justify-content: center; align-items: center; gap: 5px; }

        .keyboard-grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .key { width: 45px; height: 45px; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; transition: 0.2s; font-weight: bold; }
        
        .initial { background: var(--initial-color); }
        .medial { background: var(--medial-color); }
        .final { background: var(--final-color); }
        .tone { background: var(--tone-color); border: 2px solid #f1c40f; }

        .key.disabled { opacity: 0.15; cursor: not-allowed; filter: grayscale(1); }
        .key.highlight { box-shadow: 0 0 12px rgba(241, 196, 15, 0.5); transform: translateY(-2px); border: 2px solid #333; }

        .feedback { font-weight: bold; height: 24px; margin: 10px 0; }
        .stats { font-size: 1rem; color: #666; }
        .tone-container { grid-column: span 11; display: flex; justify-content: center; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
        .btn-next { margin-top: 15px; padding: 8px 15px; background: #34495e; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div style="color: #95a5a6;">Eja Zhuyin + Nada:</div>
        <h1 class="target-hanzi" id="target-hanzi">-</h1>
        <div class="display-area" id="display-input">_</div>
        <div class="feedback" id="feedback"></div>
        <div class="stats">Skor: <span id="score">0</span> | Soal: <span id="question-num">0</span></div>
    </div>

    <div class="keyboard-grid" id="keyboard">
        <button class="key initial" onclick="press('ㄅ')">ㄅ</button>
        <button class="key initial" onclick="press('ㄆ')">ㄆ</button>
        <button class="key initial" onclick="press('ㄇ')">ㄇ</button>
        <button class="key initial" onclick="press('ㄈ')">ㄈ</button>
        <button class="key initial" onclick="press('ㄉ')">ㄉ</button>
        <button class="key initial" onclick="press('ㄊ')">ㄊ</button>
        <button class="key initial" onclick="press('ㄋ')">ㄋ</button>
        <button class="key initial" onclick="press('ㄌ')">ㄌ</button>
        <button class="key initial" onclick="press('ㄍ')">ㄍ</button>
        <button class="key initial" onclick="press('ㄎ')">ㄎ</button>
        <button class="key initial" onclick="press('ㄏ')">ㄏ</button>
        <button class="key initial" onclick="press('ㄐ')">ㄐ</button>
        <button class="key initial" onclick="press('ㄑ')">ㄑ</button>
        <button class="key initial" onclick="press('ㄒ')">ㄒ</button>
        <button class="key initial" onclick="press('ㄓ')">ㄓ</button>
        <button class="key initial" onclick="press('ㄔ')">ㄔ</button>
        <button class="key initial" onclick="press('ㄕ')">ㄕ</button>
        <button class="key initial" onclick="press('ㄖ')">ㄖ</button>
        <button class="key initial" onclick="press('ㄗ')">ㄗ</button>
        <button class="key initial" onclick="press('ㄘ')">ㄘ</button>
        <button class="key initial" onclick="press('ㄙ')">ㄙ</button>

        <button class="key medial" onclick="press('ㄧ')">ㄧ</button>
        <button class="key medial" onclick="press('ㄨ')">ㄨ</button>
        <button class="key medial" onclick="press('ㄩ')">ㄩ</button>

        <button class="key final" onclick="press('ㄚ')">ㄚ</button>
        <button class="key final" onclick="press('ㄛ')">ㄛ</button>
        <button class="key final" onclick="press('ㄜ')">ㄜ</button>
        <button class="key final" onclick="press('ㄝ')">ㄝ</button>
        <button class="key final" onclick="press('ㄞ')">ㄞ</button>
        <button class="key final" onclick="press('ㄟ')">ㄟ</button>
        <button class="key final" onclick="press('ㄠ')">ㄠ</button>
        <button class="key final" onclick="press('ㄡ')">ㄡ</button>
        <button class="key final" onclick="press('ㄢ')">ㄢ</button>
        <button class="key final" onclick="press('ㄣ')">ㄣ</button>
        <button class="key final" onclick="press('ㄤ')">ㄤ</button>
        <button class="key final" onclick="press('ㄥ')">ㄥ</button>
        <button class="key final" onclick="press('ㄦ')">ㄦ</button>

        <div class="tone-container">
            <button class="key tone" onclick="press(' ')">ˉ</button> <button class="key tone" onclick="press('ˊ')">ˊ</button> <button class="key tone" onclick="press('ˇ')">ˇ</button> <button class="key tone" onclick="press('ˋ')">ˋ</button> <button class="key tone" onclick="press('˙')">˙</button> </div>
    </div>

    <button class="btn-next" onclick="nextQuestion()">Skip</button>

    <script>
        const wordList = [
            { h: '馬', z: 'ㄇㄚˇ' },
            { h: '我', z: 'ㄨㄛˇ' },
            { h: '你', z: 'ㄋㄧˇ' },
            { h: '他', z: 'ㄊㄚ ' }, // Spasi untuk Nada 1
            { h: '好', z: 'ㄏㄠˇ' },
            { h: '不', z: 'ㄅㄨˋ' },
            { h: '學', z: 'ㄒㄩㄝˊ' },
            { h: '的', z: 'ㄉㄜ˙' }
        ];

        let currentIndex = 0;
        let score = 0;
        let userInput = "";
        
        const initials = "ㄅㄆㄇㄈㄉㄊㄋㄌㄍㄎㄏㄐㄑㄒㄓㄔㄕㄖㄗㄘㄙ";
        const medials = "ㄧㄨㄩ";
        const finals = "ㄚㄛㄜㄝㄞㄟㄠㄡㄢㄣㄤㄥㄦ";
        const tones = " ˊˇˋ˙";

        function showQuestion() {
            userInput = "";
            document.getElementById('display-input').innerText = "_";
            document.getElementById('feedback').innerText = "";
            document.getElementById('target-hanzi').innerText = wordList[currentIndex].h;
            document.getElementById('question-num').innerText = currentIndex + 1;
            resetKeyboard();
        }

        function press(char) {
            userInput += char;
            document.getElementById('display-input').innerText = userInput.trim() === "" ? "_" : userInput;

            // Logika Flow:
            if (initials.includes(char)) {
                // Sembunyikan Initial, aktifkan vokal
                updateKeys(['medial', 'final']);
            } else if (medials.includes(char)) {
                // Aktifkan final
                updateKeys(['final']);
            } else if (finals.includes(char)) {
                // Vokal selesai, WAJIB pilih nada
                updateKeys(['tone']);
            } else if (tones.includes(char)) {
                // Nada ditekan, cek jawaban
                checkAnswer();
            }
        }

        function updateKeys(activeClasses) {
            document.querySelectorAll('.key').forEach(k => k.classList.add('disabled'));
            activeClasses.forEach(cls => {
                document.querySelectorAll('.' + cls).forEach(k => {
                    k.classList.remove('disabled');
                    k.classList.add('highlight');
                });
            });
        }

        function checkAnswer() {
            const target = wordList[currentIndex].z;
            if (userInput === target) {
                document.getElementById('feedback').innerHTML = "<span style='color:green'>Benar! 🌟</span>";
                score += 10;
                document.getElementById('score').innerText = score;
                setTimeout(nextQuestion, 1200);
            } else {
                document.getElementById('feedback').innerHTML = "<span style='color:red'>Salah, coba lagi!</span>";
                setTimeout(showQuestion, 1000);
            }
        }

        function nextQuestion() {
            currentIndex = (currentIndex + 1) % wordList.length;
            showQuestion();
        }

        function resetKeyboard() {
            document.querySelectorAll('.key').forEach(k => {
                k.classList.remove('disabled', 'highlight');
            });
        }

        window.onload = showQuestion;
    </script>
</body>
</html>

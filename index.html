<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>我們班有幾個同學？</title>
<style>
  :root{
    --board-green: #1f4a36;
    --board-green-dark: #163c2b;
    --chalk-white: #f6f3ea;
    --chalk-yellow: #ecc35e;
    --chalk-red: #e2706c;
    --chalk-blue: #5b8fd6;
    --wood-brown: #8a5a3a;
    --wood-brown-dark: #6e4429;
    --shadow: rgba(0,0,0,0.25);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0;
    min-height:100vh;
    background: var(--wood-brown-dark);
    font-family: "Helvetica Neue", "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: var(--chalk-white);
    overscroll-behavior: none;
  }

  body{
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 2px, transparent 2px, transparent 40px);
  }

  #app{
    max-width: 720px;
    margin: 0 auto;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    padding: 18px 16px 36px;
  }

  /* ---------- 標題 / 黑板感字體 ---------- */
  .chalk-title{
    font-family: "Comic Sans MS", "PingFang TC", "Microsoft JhengHei", sans-serif;
    font-weight: 800;
    letter-spacing: 1px;
    text-shadow: 0 0 6px rgba(246,243,234,0.25);
  }

  /* ---------- 黑板區塊 ---------- */
  .board{
    background: var(--board-green);
    border: 10px solid var(--wood-brown);
    border-radius: 14px;
    box-shadow: 0 10px 26px var(--shadow), inset 0 0 40px rgba(0,0,0,0.25);
    position: relative;
    padding: 18px 14px 14px;
    flex: 1;
    display:flex;
    flex-direction:column;
  }
  .board::before{
    content:"";
    position:absolute;
    inset:6px;
    border: 2px dashed rgba(246,243,234,0.08);
    border-radius: 8px;
    pointer-events:none;
  }

  /* ---------- 通用按鈕 ---------- */
  button{
    font-family: inherit;
    cursor: pointer;
    border: none;
    outline: none;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding: 14px 22px;
    border-radius: 14px;
    font-size: 1.05rem;
    font-weight: 700;
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    box-shadow: 0 4px 0 rgba(0,0,0,0.25);
  }
  .btn:active{ transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.25); }
  .btn-primary{ background: var(--chalk-yellow); color: var(--board-green-dark); }
  .btn-secondary{ background: var(--chalk-blue); color: #fff; }
  .btn-outline{ background: transparent; color: var(--chalk-white); border: 2px solid var(--chalk-white); box-shadow:none; }
  .btn-outline:active{ transform: translateY(2px); }
  .btn:disabled{ opacity:0.45; cursor:not-allowed; filter:grayscale(0.3); }
  .btn-block{ width:100%; }

  /* ---------- 首頁 ---------- */
  .home-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap: 10px;
    text-align:center;
  }
  .home-icon-row{
    display:flex;
    gap: -10px;
    margin-bottom: 6px;
  }
  .home-icon-row img{
    width: 64px; height:64px;
    border-radius:50%;
    border:3px solid var(--chalk-white);
    background:#fff;
    object-fit:cover;
  }
  .home-icon-row img:first-child{ margin-right:-18px; transform: rotate(-6deg); }
  .home-icon-row img:last-child{ transform: rotate(6deg); }

  .home-title{ font-size: 1.7rem; line-height:1.4; margin: 4px 0 2px; }
  .home-sub{ font-size: 0.92rem; opacity:0.8; margin-bottom: 18px; }

  .mode-card{
    width:100%;
    background: rgba(246,243,234,0.06);
    border: 2px solid rgba(246,243,234,0.18);
    border-radius: 16px;
    padding: 18px;
    text-align:left;
    margin-bottom: 14px;
  }
  .mode-card h3{ margin:0 0 4px; font-size:1.15rem; }
  .mode-card p{ margin:0 0 12px; font-size:0.86rem; opacity:0.78; line-height:1.5; }

  /* ---------- 練習模式 ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 10px;
  }
  .topbar .tag{
    font-size: 0.78rem;
    background: rgba(246,243,234,0.12);
    padding: 5px 12px;
    border-radius: 999px;
  }
  .back-btn{
    background: transparent;
    color: var(--chalk-white);
    font-size: 0.85rem;
    opacity: 0.8;
    padding: 6px 4px;
  }

  .student-field{
    flex:1;
    display:flex;
    flex-wrap:wrap;
    align-content:flex-start;
    justify-content:center;
    align-items:flex-start;
    gap: 6px;
    padding: 14px 4px 8px;
    min-height: 220px;
  }
  .student{
    width: 58px;
    display:flex;
    flex-direction:column;
    align-items:center;
    animation: pop-in 0.3s ease backwards;
  }
  .student img{
    width:54px; height:54px;
    border-radius:50%;
    object-fit:cover;
    background:#fff;
    border: 2px solid rgba(246,243,234,0.5);
    box-shadow: 0 3px 6px rgba(0,0,0,0.3);
  }
  @keyframes pop-in{
    from{ opacity:0; transform: scale(0.4) translateY(10px); }
    to{ opacity:1; transform: scale(1) translateY(0); }
  }

  .reveal-panel{
    background: rgba(246,243,234,0.1);
    border-radius: 12px;
    padding: 12px 14px;
    margin: 10px 0;
    display:flex;
    justify-content: space-around;
    text-align:center;
    font-size: 0.9rem;
  }
  .reveal-panel .num{
    display:block;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--chalk-yellow);
  }
  .reveal-panel .lbl{ opacity:0.8; font-size:0.78rem; }

  .control-row{
    display:flex;
    gap: 10px;
    margin-top: 8px;
  }
  .control-row .btn{ flex:1; }

  /* ---------- 測試模式 ---------- */
  .progress-track{
    height: 8px;
    background: rgba(246,243,234,0.15);
    border-radius: 999px;
    overflow:hidden;
    margin-bottom: 4px;
  }
  .progress-fill{
    height:100%;
    background: var(--chalk-yellow);
    border-radius: 999px;
    transition: width 0.3s ease;
  }

  .answer-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 14px 0;
  }
  .answer-box{
    background: rgba(246,243,234,0.08);
    border: 2px solid rgba(246,243,234,0.2);
    border-radius: 14px;
    padding: 10px 6px 12px;
    text-align:center;
  }
  .answer-box label{
    display:block;
    font-size: 0.78rem;
    opacity: 0.85;
    margin-bottom: 6px;
  }
  .answer-box input{
    width: 100%;
    text-align:center;
    font-size: 1.5rem;
    font-weight: 800;
    background: var(--chalk-white);
    color: var(--board-green-dark);
    border: none;
    border-radius: 8px;
    padding: 8px 0;
    font-family: inherit;
  }
  .answer-box input:focus{ outline: 3px solid var(--chalk-yellow); }
  /* 移除數字輸入框的上下箭頭 */
  .answer-box input::-webkit-outer-spin-button,
  .answer-box input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .answer-box input[type=number]{ -moz-appearance:textfield; }

  .answer-box.correct input{ box-shadow: 0 0 0 3px var(--chalk-blue) inset; }
  .answer-box.wrong input{ box-shadow: 0 0 0 3px var(--chalk-red) inset; }

  .feedback-row{
    text-align:center;
    font-size: 0.85rem;
    min-height: 1.4em;
    margin-bottom: 6px;
    font-weight:700;
  }
  .feedback-row.ok{ color: #9be3a8; }
  .feedback-row.no{ color: var(--chalk-red); }

  /* ---------- 成績頁 ---------- */
  .score-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    gap: 6px;
  }
  .score-big{
    font-size: 3.4rem;
    font-weight: 800;
    color: var(--chalk-yellow);
    line-height:1;
  }
  .score-big sub{ font-size:1.4rem; opacity:0.7; font-weight:700; }
  .score-detail{
    font-size: 0.9rem;
    opacity: 0.85;
    margin: 6px 0 18px;
  }
  .score-list{
    width:100%;
    max-height: 220px;
    overflow-y:auto;
    margin-bottom: 18px;
    text-align:left;
  }
  .score-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 8px 12px;
    border-radius: 10px;
    background: rgba(246,243,234,0.06);
    margin-bottom: 6px;
    font-size: 0.85rem;
  }
  .score-row .mark{ font-weight:800; }
  .score-row.is-ok .mark{ color:#9be3a8; }
  .score-row.is-no .mark{ color: var(--chalk-red); }

  /* ---------- chalk underline 裝飾 ---------- */
  .underline-deco{
    display:inline-block;
    position:relative;
  }
  .underline-deco::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:-4px;
    height:4px;
    background: var(--chalk-yellow);
    border-radius:2px;
    opacity:0.7;
  }

  /* 小螢幕微調 */
  @media (max-width:380px){
    .student{ width:50px; }
    .student img{ width:46px; height:46px; }
    .score-big{ font-size: 2.8rem; }
  }

  .sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
</style>
</head>

const MAX_STUDENTS = 15;
const MIN_STUDENTS = 3;
const TEST_TOTAL_QUESTIONS = 10;

const app = document.getElementById('app');

/* ---------- 共用：產生隨機題目（男女混合頭像陣列） ---------- */
function randInt(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateRoster(){
  const total = randInt(MIN_STUDENTS, MAX_STUDENTS);
  const boys = randInt(0, total);
  const girls = total - boys;
  const list = [];
  for(let i=0;i<boys;i++) list.push('boy');
  for(let i=0;i<girls;i++) list.push('girl');
  for(let i=list.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    const tmp = list[i]; list[i] = list[j]; list[j] = tmp;
  }
  return { total, boys, girls, list };
}

function renderStudentField(list){
  return list.map(function(g, idx){
    const img = g === 'boy' ? BOY_IMG : GIRL_IMG;
    const delay = (idx * 0.03).toFixed(2);
    return '<div class="student" style="animation-delay:' + delay + 's">' +
      '<img src="' + img + '" alt="' + (g === 'boy' ? '男同學' : '女同學') + '">' +
      '</div>';
  }).join('');
}

/* ====================================================== */
/* 路由狀態 */
/* ====================================================== */
let state = { screen: 'home' };

function go(screen, payload){
  state = Object.assign({ screen: screen }, payload || {});
  render();
  window.scrollTo(0,0);
}

          '<div><span class="num" style="color:var(--chalk-blue)">' + roster.boys + '</span><span class="lbl">男生</span></div>' +

}

/* ====================================================== */
/* 測試模式 */
/* ====================================================== */
function renderTest(){
  const qIndex = state.qIndex, roster = state.roster, answers = state.answers,
        submitted = state.submitted, inputTotal = state.inputTotal,
        inputBoys = state.inputBoys, inputGirls = state.inputGirls;
  const progress = Math.round((qIndex / TEST_TOTAL_QUESTIONS) * 100);

  let totalClass = '', boysClass = '', girlsClass = '';
  let feedbackHtml = '';
  let feedbackClass = '';
  if(submitted){
    const okTotal = Number(inputTotal) === roster.total;
    const okBoys = Number(inputBoys) === roster.boys;
    const okGirls = Number(inputGirls) === roster.girls;
    totalClass = okTotal ? 'correct' : 'wrong';
    boysClass = okBoys ? 'correct' : 'wrong';
    girlsClass = okGirls ? 'correct' : 'wrong';
    const allOk = okTotal && okBoys && okGirls;
    feedbackClass = allOk ? 'ok' : 'no';
    feedbackHtml = allOk
      ? '✓ 全部正確！'
      : ('✗ 正確答案：總人數 ' + roster.total + '・男生 ' + roster.boys + '・女生 ' + roster.girls);
  }

  app.innerHTML =
    '<div class="topbar">' +
      '<button class="back-btn" id="back-home">← 回首頁</button>' +
      '<span class="tag">第 ' + (qIndex+1) + ' / ' + TEST_TOTAL_QUESTIONS + ' 題</span>' +
    '</div>' +
    '<div class="board">' +
      '<div class="progress-track"><div class="progress-fill" style="width:' + progress + '%"></div></div>' +
      '<div class="student-field">' + renderStudentField(roster.list) + '</div>' +

      '<div class="feedback-row ' + feedbackClass + '">' + feedbackHtml + '</div>' +

      '<div class="answer-grid">' +
        '<div class="answer-box ' + totalClass + '">' +
          '<label>總人數</label>' +
          '<input type="number" inputmode="numeric" id="inp-total" maxlength="2" value="' + inputTotal + '" ' + (submitted?'disabled':'') + '>' +
        '</div>' +
        '<div class="answer-box ' + boysClass + '">' +
          '<label>男生</label>' +
          '<input type="number" inputmode="numeric" id="inp-boys" maxlength="2" value="' + inputBoys + '" ' + (submitted?'disabled':'') + '>' +
        '</div>' +
        '<div class="answer-box ' + girlsClass + '">' +
          '<label>女生</label>' +
          '<input type="number" inputmode="numeric" id="inp-girls" maxlength="2" value="' + inputGirls + '" ' + (submitted?'disabled':'') + '>' +
        '</div>' +
      '</div>' +

      '<div class="control-row">' +
        (submitted
          ? '<button class="btn btn-primary btn-block" id="next-q">' + ((qIndex+1 >= TEST_TOTAL_QUESTIONS) ? '查看成績 →' : '下一題 →') + '</button>'
          : '<button class="btn btn-primary btn-block" id="submit-ans">送出答案</button>'
        ) +
      '</div>' +
    '</div>';

  document.getElementById('back-home').onclick = function(){
    if(confirm('測試尚未完成，確定要回首頁嗎？目前的成績將不會被記錄。')) go('home');
  };

  const tInput = document.getElementById('inp-total');
  const bInput = document.getElementById('inp-boys');
  const gInput = document.getElementById('inp-girls');

  if(!submitted){
    tInput.oninput = function(e){ state.inputTotal = e.target.value; };
    bInput.oninput = function(e){ state.inputBoys = e.target.value; };
    gInput.oninput = function(e){ state.inputGirls = e.target.value; };
    tInput.focus();

    document.getElementById('submit-ans').onclick = function(){
      if(state.inputTotal === '' || state.inputBoys === '' || state.inputGirls === ''){
        alert('請把三個空格都填上數字再送出喔！');
        return;
      }
      const record = {
        roster: roster,
        inputTotal: state.inputTotal,
        inputBoys: state.inputBoys,
        inputGirls: state.inputGirls,
        okTotal: Number(state.inputTotal) === roster.total,
        okBoys: Number(state.inputBoys) === roster.boys,
        okGirls: Number(state.inputGirls) === roster.girls
      };
      const newAnswers = answers.concat([record]);
      go('test', {
        qIndex: qIndex, roster: roster, answers: newAnswers, submitted: true,
        inputTotal: state.inputTotal, inputBoys: state.inputBoys, inputGirls: state.inputGirls
      });
    };
  } else {
    document.getElementById('next-q').onclick = function(){
      const nextIndex = qIndex + 1;
      if(nextIndex >= TEST_TOTAL_QUESTIONS){
        go('score', { answers: answers });
      } else {
        go('test', {
          qIndex: nextIndex,
          roster: generateRoster(),
          answers: answers,
          submitted: false,
          inputTotal: '', inputBoys: '', inputGirls: ''
        });
      }
    };
  }
}

/* ====================================================== */
/* 成績頁 */
/* ====================================================== */
function renderScore(){
  const answers = state.answers;
  let pointsEarned = 0;
  const pointsTotal = answers.length * 3;
  answers.forEach(function(a){
    if(a.okTotal) pointsEarned++;
    if(a.okBoys) pointsEarned++;
    if(a.okGirls) pointsEarned++;
  });
  const percent = pointsTotal ? Math.round((pointsEarned / pointsTotal) * 100) : 0;
  const perfectCount = answers.filter(function(a){ return a.okTotal && a.okBoys && a.okGirls; }).length;

  let comment = '';
  if(percent === 100) comment = '🌟 太厲害了，全部都數對！';
  else if(percent >= 80) comment = '👍 做得很好，再接再厲！';
  else if(percent >= 50) comment = '💪 還不錯，可以再練習一下！';
  else comment = '📚 多練習幾次，會越來越準喔！';

  const listHtml = answers.map(function(a, i){
    const allOk = a.okTotal && a.okBoys && a.okGirls;
    const markHtml = allOk ? '✓' : ((a.okTotal?1:0) + '+' + (a.okBoys?1:0) + '+' + (a.okGirls?1:0) + '/3');
    return '<div class="score-row ' + (allOk ? 'is-ok':'is-no') + '">' +
      '<span>第 ' + (i+1) + ' 題：總' + a.roster.total + '・男' + a.roster.boys + '・女' + a.roster.girls + '</span>' +
      '<span class="mark">' + markHtml + '</span>' +
    '</div>';
  }).join('');

  app.innerHTML =
    '<div class="topbar">' +
      '<span class="tag">測試完成</span>' +
      '<span></span>' +
    '</div>' +
    '<div class="board">' +
      '<div class="score-wrap">' +
        '<div class="chalk-title" style="font-size:1.1rem;opacity:0.85;">成績單 / Score</div>' +
        '<div class="score-big">' + percent + '<sub> 分</sub></div>' +
        '<div class="score-detail">共 ' + answers.length + ' 題・答對 ' + pointsEarned + ' / ' + pointsTotal + ' 個數字・全對 ' + perfectCount + ' 題</div>' +
        '<div class="chalk-title" style="font-size:0.95rem;margin-bottom:10px;">' + comment + '</div>' +

        '<div class="score-list">' + listHtml + '</div>' +

        '<button class="btn btn-primary btn-block" id="retry">再測一次</button>' +
        '<div style="height:10px"></div>' +
        '<button class="btn btn-outline btn-block" id="home-btn">回首頁</button>' +
      '</div>' +
    '</div>';

  document.getElementById('retry').onclick = function(){
    go('test', {
      qIndex: 0, roster: generateRoster(), answers: [], submitted:false,
      inputTotal:'', inputBoys:'', inputGirls:''
    });
  };
  document.getElementById('home-btn').onclick = function(){ go('home'); };
}

/* ====================================================== */
/* 主渲染分配 */
/* ====================================================== */
function render(){
  if(state.screen === 'home') renderHome();
  else if(state.screen === 'practice') renderPractice();
  else if(state.screen === 'test') renderTest();
  else if(state.screen === 'score') renderScore();
}

render();
</script>
</body>
</html>

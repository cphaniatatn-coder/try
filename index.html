<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taiwan Standard Zhuyin Keyboard</title>
    <style>
        :root {
            --chassis: #2d3436;
            --key-bg: #ffffff;
            --initial: #ffeaa7;
            --medial: #55efc4;
            --final: #81ecec;
            --tone: #fab1a0;
        }

        body {
            background-color: #ecf0f1;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .screen {
            background: #fff;
            width: 800px;
            padding: 20px;
            border-radius: 10px;
            border: 8px solid var(--chassis);
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .target-hanzi { font-size: 4rem; margin: 10px 0; }
        .input-display { font-size: 2.5rem; color: #0984e3; height: 50px; letter-spacing: 5px; border-bottom: 2px solid #ddd; display: inline-block; min-width: 150px;}

        .keyboard {
            background: var(--chassis);
            padding: 15px;
            border-radius: 12px;
            width: 850px;
            user-select: none;
        }

        .row { display: flex; justify-content: flex-start; margin-bottom: 6px; gap: 5px; padding-left: 10px; }
        
        /* Offset untuk baris agar menyerupai keyboard asli */
        .row-2 { padding-left: 35px; }
        .row-3 { padding-left: 50px; }
        .row-4 { padding-left: 70px; }

        .key {
            width: 54px; height: 54px;
            background: var(--key-bg);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 0 #636e72;
            position: relative;
        }

        .key:active { transform: translateY(3px); box-shadow: 0 1px 0 #636e72; }
        
        .key .eng { font-size: 0.65rem; color: #b2bec3; position: absolute; top: 5px; left: 5px; }
        .key .zhuyin { font-size: 1.3rem; margin-top: 5px; }

        /* Warna kategori */
        .initial { background: var(--initial); }
        .medial { background: var(--medial); }
        .final { background: var(--final); }
        .tone { background: var(--tone); }

        .key-wide { width: 90px; background: #95a5a6; color: white; }
        .key-space { width: 350px; background: white; }
        
        .disabled { opacity: 0.3; pointer-events: none; }
        .highlight { outline: 3px solid #f1c40f; z-index: 10; }
    </style>
</head>
<body>

    <div class="screen">
        <div id="msg" style="color: #e74c3c; height: 20px;"></div>
        <div class="target-hanzi" id="target">馬</div>
        <div class="input-display" id="display">_</div>
        <p>Skor: <span id="score">0</span></p>
    </div>

    <div class="keyboard">
        <div class="row">
            <button class="key initial" onclick="press('ㄅ')"><span class="eng">1</span><span class="zhuyin">ㄅ</span></button>
            <button class="key initial" onclick="press('ㄆ')"><span class="eng">2</span><span class="zhuyin">ㄆ</span></button>
            <button class="key initial" onclick="press('ㄇ')"><span class="eng">3</span><span class="zhuyin">ㄇ</span></button>
            <button class="key initial" onclick="press('ㄈ')"><span class="eng">4</span><span class="zhuyin">ㄈ</span></button>
            <button class="key initial" onclick="press('ㄉ')"><span class="eng">5</span><span class="zhuyin">ㄉ</span></button>
            <button class="key initial" onclick="press('ㄊ')"><span class="eng">6</span><span class="zhuyin">ㄊ</span></button>
            <button class="key initial" onclick="press('ㄋ')"><span class="eng">7</span><span class="zhuyin">ㄋ</span></button>
            <button class="key initial" onclick="press('ㄌ')"><span class="eng">8</span><span class="zhuyin">ㄌ</span></button>
            <button class="key initial" onclick="press('ㄍ')"><span class="eng">9</span><span class="zhuyin">ㄍ</span></button>
            <button class="key initial" onclick="press('ㄎ')"><span class="eng">0</span><span class="zhuyin">ㄎ</span></button>
            <button class="key key-wide" onclick="resetInput()">Hapus</button>
        </div>

        <div class="row row-2">
            <button class="key initial" onclick="press('ㄏ')"><span class="eng">Q</span><span class="zhuyin">ㄏ</span></button>
            <button class="key initial" onclick="press('ㄐ')"><span class="eng">W</span><span class="zhuyin">ㄐ</span></button>
            <button class="key initial" onclick="press('ㄑ')"><span class="eng">E</span><span class="zhuyin">ㄑ</span></button>
            <button class="key initial" onclick="press('ㄒ')"><span class="eng">R</span><span class="zhuyin">ㄒ</span></button>
            <button class="key initial" onclick="press('ㄓ')"><span class="eng">T</span><span class="zhuyin">ㄓ</span></button>
            <button class="key initial" onclick="press('ㄔ')"><span class="eng">Y</span><span class="zhuyin">ㄔ</span></button>
            <button class="key initial" onclick="press('ㄕ')"><span class="eng">U</span><span class="zhuyin">ㄕ</span></button>
            <button class="key initial" onclick="press('ㄖ')"><span class="eng">I</span><span class="zhuyin">ㄖ</span></button>
            <button class="key initial" onclick="press('ㄗ')"><span class="eng">O</span><span class="zhuyin">ㄗ</span></button>
            <button class="key initial" onclick="press('ㄘ')"><span class="eng">P</span><span class="zhuyin">ㄘ</span></button>
        </div>

        <div class="row row-3">
            <button class="key initial" onclick="press('ㄙ')"><span class="eng">A</span><span class="zhuyin">ㄙ</span></button>
            <button class="key medial" onclick="press('ㄧ')"><span class="eng">S</span><span class="zhuyin">ㄧ</span></button>
            <button class="key medial" onclick="press('ㄨ')"><span class="eng">D</span><span class="zhuyin">ㄨ</span></button>
            <button class="key medial" onclick="press('ㄩ')"><span class="eng">F</span><span class="zhuyin">ㄩ</span></button>
            <button class="key final" onclick="press('ㄚ')"><span class="eng">G</span><span class="zhuyin">ㄚ</span></button>
            <button class="key final" onclick="press('ㄛ')"><span class="eng">H</span><span class="zhuyin">ㄛ</span></button>
            <button class="key final" onclick="press('ㄜ')"><span class="eng">J</span><span class="zhuyin">ㄜ</span></button>
            <button class="key final" onclick="press('ㄝ')"><span class="eng">K</span><span class="zhuyin">ㄝ</span></button>
            <button class="key final" onclick="press('ㄞ')"><span class="eng">L</span><span class="zhuyin">ㄞ</span></button>
            <button class="key tone" onclick="press('ˋ')"><span class="eng">;</span><span class="zhuyin">ˋ</span></button>
        </div>

        <div class="row row-4">
            <button class="key final" onclick="press('ㄟ')"><span class="eng">Z</span><span class="zhuyin">ㄟ</span></button>
            <button class="key final" onclick="press('ㄠ')"><span class="eng">X</span><span class="zhuyin">ㄠ</span></button>
            <button class="key final" onclick="press('ㄡ')"><span class="eng">C</span><span class="zhuyin">ㄡ</span></button>
            <button class="key final" onclick="press('ㄢ')"><span class="eng">V</span><span class="zhuyin">ㄢ</span></button>
            <button class="key final" onclick="press('ㄣ')"><span class="eng">B</span><span class="zhuyin">ㄣ</span></button>
            <button class="key final" onclick="press('ㄤ')"><span class="eng">N</span><span class="zhuyin">ㄤ</span></button>
            <button class="key final" onclick="press('ㄥ')"><span class="eng">M</span><span class="zhuyin">ㄥ</span></button>
            <button class="key final" onclick="press('ㄦ')"><span class="eng">,</span><span class="zhuyin">ㄦ</span></button>
            <button class="key tone" onclick="press('ˊ')"><span class="eng">.</span><span class="zhuyin">ˊ</span></button>
            <button class="key tone" onclick="press('ˇ')"><span class="eng">/</span><span class="zhuyin">ˇ</span></button>
        </div>

        <div class="row" style="justify-content: center; margin-top: 10px;">
            <button class="key tone" style="width: 60px;" onclick="press('˙')">˙</button>
            <button class="key key-space" onclick="press(' ')">SPACE (NADA 1)</button>
            <button class="key key-wide" style="background: #27ae60;" onclick="submit()">ENTER</button>
        </div>
    </div>

    <script>
        const words = [
            {h:'我', z:'ㄨㄛˇ'}, {h:'你', z:'ㄋㄧˇ'}, {h:'馬', z:'ㄇㄚˇ'},
            {h:'學', z:'ㄒㄩㄝˊ'}, {h:'好', z:'ㄏㄠˇ'}, {h:'的', z:'ㄉㄜ˙'}
        ];
        let idx = 0;
        let score = 0;
        let input = "";

        const initials = "ㄅㄆㄇㄈㄉㄊㄋㄌㄍㄎㄏㄐㄑㄒㄓㄔㄕㄖㄗㄘㄙ";
        const medials = "ㄧㄨㄩ";
        const finals = "ㄚㄛㄜㄝㄞㄟㄠㄡㄢㄣㄤㄥㄦ";

        function press(c) {
            input += c;
            document.getElementById('display').innerText = input;
            
            // Logika Signaling Mayer: Beritahu murid langkah selanjutnya
            if (initials.includes(c)) highlight(['medial', 'final']);
            else if (medials.includes(c)) highlight(['final']);
            else if (finals.includes(c)) highlight(['tone']);
        }

        function highlight(types) {
            document.querySelectorAll('.key').forEach(k => {
                if(!k.classList.contains('key-wide') && !k.classList.contains('key-space')) k.classList.add('disabled');
            });
            types.forEach(t => {
                document.querySelectorAll('.'+t).forEach(k => {
                    k.classList.remove('disabled');
                    k.classList.add('highlight');
                });
            });
        }

        function resetInput() {
            input = "";
            document.getElementById('display').innerText = "_";
            document.getElementById('msg').innerText = "";
            document.querySelectorAll('.key').forEach(k => k.classList.remove('disabled', 'highlight'));
        }

        function submit() {
            if (input === words[idx].z) {
                score += 10;
                document.getElementById('score').innerText = score;
                document.getElementById('msg').innerText = "Hebat! 🎉";
                setTimeout(() => {
                    idx = (idx + 1) % words.length;
                    document.getElementById('target').innerText = words[idx].h;
                    resetInput();
                }, 1000);
            } else {
                document.getElementById('msg').innerText = "Salah, coba lagi!";
                input = "";
                document.getElementById('display').innerText = "_";
            }
        }
    </script>
</body>
</html>

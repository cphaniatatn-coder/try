<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhuyin Laptop Trainer</title>
    <style>
        :root {
            --kb-base: #2d3436;
            --key-bg: #fdfdfd;
            --key-text: #2d3436;
            --initial: #ffeaa7;
            --medial: #55efc4;
            --final: #81ecec;
            --tone: #fab1a0;
        }

        body {
            background-color: #dfe6e9;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Screen Area */
        .laptop-screen {
            background: white;
            width: 100%;
            max-width: 850px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 40px;
            border: 10px solid #2d3436;
        }

        .target-hanzi { font-size: 5rem; margin: 10px 0; color: #2d3436; }
        .display-text { font-size: 2.5rem; color: #0984e3; min-height: 60px; letter-spacing: 8px; }

        /* Keyboard Chassis */
        .keyboard-chassis {
            background: var(--kb-base);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 900px;
        }

        .kb-row {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
            gap: 6px;
        }

        /* Key Styling */
        .key {
            background: var(--key-bg);
            color: var(--key-text);
            border: none;
            border-radius: 6px;
            width: 60px;
            height: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
            box-shadow: 0 4px 0 #b2bec3;
        }

        .key:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b2bec3;
        }

        .key span.small { font-size: 0.7rem; color: #636e72; margin-bottom: 2px; }

        /* Color Coding */
        .initial { background: var(--initial); }
        .medial { background: var(--medial); }
        .final { background: var(--final); }
        .tone { background: var(--tone); }
        
        /* Functional Keys */
        .key-backspace { width: 100px; background: #e17055; color: white; }
        .key-space { width: 350px; }
        .key-enter { width: 90px; background: #00b894; color: white; }

        /* States */
        .disabled { opacity: 0.2; cursor: not-allowed; pointer-events: none; }
        .highlight { outline: 3px solid #fdcb6e; transform: scale(1.02); }

        #feedback { font-weight: bold; margin-top: 10px; height: 20px; }
    </style>
</head>
<body>

    <div class="laptop-screen">
        <div id="feedback"></div>
        <h1 class="target-hanzi" id="target-hanzi">我</h1>
        <div class="display-text" id="display-input">_</div>
        <div style="color: #636e72">Skor: <span id="score">0</span></div>
    </div>

    <div class="keyboard-chassis" id="keyboard">
        <div class="kb-row">
            <button class="key initial" onclick="press('ㄅ')"><span class="small">1</span>ㄅ</button>
            <button class="key initial" onclick="press('ㄆ')"><span class="small">2</span>ㄆ</button>
            <button class="key initial" onclick="press('ㄇ')"><span class="small">3</span>ㄇ</button>
            <button class="key initial" onclick="press('ㄈ')"><span class="small">4</span>ㄈ</button>
            <button class="key initial" onclick="press('ㄉ')"><span class="small">5</span>ㄉ</button>
            <button class="key initial" onclick="press('ㄊ')"><span class="small">6</span>ㄊ</button>
            <button class="key initial" onclick="press('ㄋ')"><span class="small">7</span>ㄋ</button>
            <button class="key initial" onclick="press('ㄌ')"><span class="small">8</span>ㄌ</button>
            <button class="key initial" onclick="press('ㄍ')"><span class="small">9</span>ㄍ</button>
            <button class="key initial" onclick="press('ㄎ')"><span class="small">0</span>ㄎ</button>
            <button class="key key-backspace" onclick="handleDelete()">Delete</button>
        </div>

        <div class="kb-row">
            <button class="key initial" onclick="press('ㄏ')"><span class="small">Q</span>ㄏ</button>
            <button class="key initial" onclick="press('ㄐ')"><span class="small">W</span>ㄐ</button>
            <button class="key initial" onclick="press('ㄑ')"><span class="small">E</span>ㄑ</button>
            <button class="key initial" onclick="press('ㄒ')"><span class="small">R</span>ㄒ</button>
            <button class="key initial" onclick="press('ㄓ')"><span class="small">T</span>ㄓ</button>
            <button class="key initial" onclick="press('ㄔ')"><span class="small">Y</span>ㄔ</button>
            <button class="key initial" onclick="press('ㄕ')"><span class="small">U</span>ㄕ</button>
            <button class="key initial" onclick="press('ㄖ')"><span class="small">I</span>ㄖ</button>
            <button class="key initial" onclick="press('ㄗ')"><span class="small">O</span>ㄗ</button>
            <button class="key initial" onclick="press('ㄘ')"><span class="small">P</span>ㄘ</button>
        </div>

        <div class="kb-row">
            <button class="key initial" onclick="press('ㄙ')"><span class="small">A</span>ㄙ</button>
            <button class="key medial" onclick="press('ㄧ')"><span class="small">S</span>ㄧ</button>
            <button class="key medial" onclick="press('ㄨ')"><span class="small">D</span>ㄨ</button>
            <button class="key medial" onclick="press('ㄩ')"><span class="small">F</span>ㄩ</button>
            <button class="key final" onclick="press('ㄚ')"><span class="small">G</span>ㄚ</button>
            <button class="key final" onclick="press('ㄛ')"><span class="small">H</span>ㄛ</button>
            <button class="key final" onclick="press('ㄜ')"><span class="small">J</span>ㄜ</button>
            <button class="key final" onclick="press('ㄝ')"><span class="small">K</span>ㄝ</button>
            <button class="key final" onclick="press('ㄞ')"><span class="small">L</span>ㄞ</button>
            <button class="key tone" onclick="press('ˋ')"><span class="small">;</span>ˋ</button>
        </div>

        <div class="kb-row">
            <button class="key final" onclick="press('ㄟ')"><span class="small">Z</span>ㄟ</button>
            <button class="key final" onclick="press('ㄠ')"><span class="small">X</span>ㄠ</button>
            <button class="key final" onclick="press('ㄡ')"><span class="small">C</span>ㄡ</button>
            <button class="key final" onclick="press('ㄢ')"><span class="small">V</span>ㄢ</button>
            <button class="key final" onclick="press('ㄣ')"><span class="small">B</span>ㄣ</button>
            <button class="key final" onclick="press('ㄤ')"><span class="small">N</span>ㄤ</button>
            <button class="key final" onclick="press('ㄥ')"><span class="small">M</span>ㄥ</button>
            <button class="key final" onclick="press('ㄦ')"><span class="small">,</span>ㄦ</button>
            <button class="key tone" onclick="press('ˊ')"><span class="small">.</span>ˊ</button>
            <button class="key tone" onclick="press('ˇ')"><span class="small">/</span>ˇ</button>
        </div>

        <div class="kb-row">
            <button class="key tone" style="width: 80px;" onclick="press('˙')">˙</button>
            <button class="key tone key-space" onclick="press(' ')">NADA 1 (SPACE)</button>
            <button class="key key-enter" onclick="checkAnswer()">ENTER</button>
        </div>
    </div>

    <script>
        const wordList = [
            { h: '馬', z: 'ㄇㄚˇ' },
            { h: '好', z: 'ㄏㄠˇ' },
            { h: '學', z: 'ㄒㄩㄝˊ' },
            { h: '你', z: 'ㄋㄧˇ' },
            { h: '他', z: 'ㄊㄚ ' }
        ];

        let currentIndex = 0;
        let score = 0;
        let userInput = "";
        
        const initials = "ㄅㄆㄇㄈㄉㄊㄋㄌㄍㄎㄏㄐㄑㄒㄓㄔㄕㄖㄗㄘㄙ";
        const medials = "ㄧㄨㄩ";
        const finals = "ㄚㄛㄜㄝㄞㄟㄠㄡㄢㄣㄤㄥㄦ";

        function showQuestion() {
            userInput = "";
            document.getElementById('display-input').innerText = "_";
            document.getElementById('feedback').innerText = "";
            document.getElementById('target-hanzi').innerText = wordList[currentIndex].h;
            resetKeyboard();
        }

        function press(char) {
            userInput += char;
            document.getElementById('display-input').innerText = userInput;
            updateLogic(char);
        }

        function updateLogic(char) {
            if (initials.includes(char)) {
                lockExcept(['medial', 'final']);
            } else if (medials.includes(char)) {
                lockExcept(['final']);
            } else if (finals.includes(char)) {
                lockExcept(['tone']);
            }
        }

        function lockExcept(classes) {
            document.querySelectorAll('.key:not(.key-backspace):not(.key-enter)').forEach(k => k.classList.add('disabled'));
            classes.forEach(c => {
                document.querySelectorAll('.' + c).forEach(k => {
                    k.classList.remove('disabled');
                    k.classList.add('highlight');
                });
            });
        }

        function handleDelete() {
            userInput = "";
            showQuestion();
        }

        function checkAnswer() {
            if (userInput === wordList[currentIndex].z) {
                document.getElementById('feedback').innerText = "BENAR! 👏";
                score += 10;
                document.getElementById('score').innerText = score;
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % wordList.length;
                    showQuestion();
                }, 1000);
            } else {
                document.getElementById('feedback').innerText = "SALAH! Coba lagi.";
                userInput = "";
                document.getElementById('display-input').innerText = "_";
                resetKeyboard();
            }
        }

        function resetKeyboard() {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('disabled', 'highlight'));
        }

        window.onload = showQuestion;
    </script>
</body>
</html>
